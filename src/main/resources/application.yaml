spring:
  autoconfigure:
    exclude:  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  application:
    name: smartfacility

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080